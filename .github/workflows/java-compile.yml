name: Java Quality and Documentation

on: [push, pull_request]

permissions:
  contents: write  # Necesario para que la acción pueda publicar el Javadoc

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 1. VERIFICACIÓN DE ESTILO (Linter)
    # Usamos Checkstyle, una herramienta estándar en la industria.
    - name: Verificar estilo con Checkstyle
      run: |
        # Descargamos el ejecutable de Checkstyle
        wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.5/checkstyle-10.12.5-all.jar
        
        # Ejecutamos la verificación usando las reglas de Google (puedes cambiarlas por 'sun_checks.xml')
        # Si hay errores de estilo, la Action fallará (se pondrá en rojo)
        java -jar checkstyle-10.12.5-all.jar -c /google_checks.xml src/

    # 2. COMPILACIÓN (Paso previo necesario)
    - name: Compilar el proyecto
      run: |
        mkdir -p out  # El flag -p evita errores si la carpeta ya existe
        find src -name "*.java" > sources.txt
        javac -d out @sources.txt
    # 3. GENERACIÓN DE JAVADOC
    - name: Generar Javadoc
      run: |
        mkdir -p docs/javadoc
        # Generamos la documentación de todos los archivos en 'src'
        javadoc -d docs/javadoc -sourcepath src -subpackages .

    # 4. PUBLICACIÓN AUTOMÁTICA (Opcional pero muy visual)
    # Esto subirá el Javadoc a una rama llamada 'gh-pages' para que se vea como una web
    - name: Desplegar Javadoc a GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: docs/javadoc
        branch: gh-pages
